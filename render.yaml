services:
  - type: web
    name: anaunim
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python backend/server.py --host 0.0.0.0
    envVars:
      - key: APP_BASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_GRAPH_VERSION
        value: v23.0
      - key: META_LOGIN_CONFIG_ID
        sync: false
      - key: META_REDIRECT_URI
        sync: false
      - key: DATABASE_PATH
        value: /opt/render/project/src/data/anaunim.sqlite
